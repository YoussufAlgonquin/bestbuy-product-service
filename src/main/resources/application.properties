# MongoDB connection — reads from environment variable MONGO_URI
# The ${VAR:default} syntax means "use env var VAR, or fall back to default"
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/bestbuy}

server.port=${PORT:8080}

# Expose Actuator endpoints: health (K8s probes), metrics (Prometheus)
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# Enable separate liveness and readiness probes
# Liveness = "is the app alive?" (restart if no)
# Readiness = "is the app ready to serve traffic?" (stop sending traffic if no)
management.endpoint.health.probes.enabled=true

# Automatically set createdAt on save
spring.data.mongodb.auto-index-creation=true