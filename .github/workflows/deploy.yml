name: Build and Deploy — product-service

on:
  push:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # Caches ~/.m2/repository — subsequent runs skip re-downloading deps

      - name: Run unit tests
        run: mvn test

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tag with both the git SHA (immutable, traceable) and latest (convenient)
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bestbuy-product-service:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bestbuy-product-service:latest

      - name: Set AKS context
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/product-service \
            product-service=${{ secrets.DOCKERHUB_USERNAME }}/bestbuy-product-service:${{ github.sha }} \
            -n bestbuy
          # Wait for the rollout to complete — fails the pipeline if deployment hangs
          kubectl rollout status deployment/product-service -n bestbuy --timeout=120s